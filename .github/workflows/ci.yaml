name: Build and Push books image to Docker Hub

on:
  push:
    branches: 
      - main
      - 'feature/*'
      - 'bugfix/*'
      - 'hotfix/*'

jobs:
  code-analysis:
    name: Code Tests and SonarQube Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
        with:
          # Disabling shallow clones is recommended for improving the relevancy of reporting
          fetch-depth: 0

      - name: Extract metadata
        id: meta
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c #v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run tests
        run: |
          go test -v -coverprofile=coverage.out ./...

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 #v7
        with:
         args: >
          -Dsonar.projectVersion=${{ steps.meta.outputs.SHORT_SHA }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Quality Gate check
        uses: sonarsource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b #v1.2.0
        with:
          pollingTimeoutSec: 600
        env:
         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: code-analysis
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6

      - name: Extract metadata
        id: meta
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 #v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f #v7
        with:
          context: .
          file: Dockerfile
          load: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/books:${{ steps.meta.outputs.SHORT_SHA }}

      - name: Push image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f #v7
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/books:latest
            ${{ secrets.DOCKER_USERNAME }}/books:${{ steps.meta.outputs.SHORT_SHA }}
