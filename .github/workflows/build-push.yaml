name: Build and Push books image to Docker Hub

on:
  push:
    branches: 
      - main
      - 'feature/*'
      - 'bugfix/*'
      - 'hotfix/*'

jobs:
  sonarqube:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Disabling shallow clones is recommended for improving the relevancy of reporting
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=antonio-tolentino
            -Dsonar.organization=Antonio-Tolentino
            -Dsonar.qualitygate.wait=true

      - name: Extract metadata
        id: meta
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  build-and-push:
    runs-on: ubuntu-latest
    needs: sonarqube
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          load: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/books:${{ steps.meta.outputs.SHORT_SHA }}

      - name: Push image
        uses: docker/build-push-action@v7
        if: ${{ github.ref == 'refs/heads/main' }}
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/books:latest
            ${{ secrets.DOCKER_USERNAME }}/books:${{ steps.meta.outputs.SHORT_SHA }}
